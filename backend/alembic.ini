# Alembic Migration Environment Configuration
# Docs: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Alembic sẽ đọc DATABASE_URL từ env.py thông qua pydantic settings
# script_location là thư mục chứa các file migration
script_location = alembic

# Template cho tên file migration: {rev}_{slug}.py
file_template = %%(rev)s_%%(slug)s

# Timezone cho timestamp trong migration file
timezone = UTC

[post_write_hooks]
# (tuỳ chọn) auto-format migration file sau khi sinh ra

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
