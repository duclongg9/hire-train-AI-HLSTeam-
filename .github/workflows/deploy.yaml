name: Build and Deploy

on:
  push:
    branches:
      - feat/infra
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 1. Build and Push Backend Image
      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG

      # 2. Build and Push Frontend Image
      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # 3. Deploy Backend to EC2 Private via SSM Run Command
      - name: Deploy Backend to Private EC2
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.BACKEND_INSTANCE_ID }}" \
            --parameters 'commands=[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_NAME }}:backend-latest",
              "docker stop hls-backend || true",
              "docker rm hls-backend || true",
              "docker run -d --name hls-backend -p 8000:8000 --restart always -e APP_ENV=production -e STORAGE_PROVIDER=supabase -e DATABASE_URL=\"${{ secrets.DATABASE_URL }}\" -e SUPABASE_URL=\"${{ secrets.SUPABASE_URL }}\" -e SUPABASE_SERVICE_ROLE_KEY=\"${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}\" -e AI_PROVIDER=gemini -e GEMINI_API_KEY=\"${{ secrets.GEMINI_API_KEY }}\" ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_NAME }}:backend-latest"
            ]' \
            --comment "Deploy Backend Container"

      # 4. Deploy Frontend to EC2 Public via SSM Run Command
      - name: Deploy Frontend to Public EC2
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.FRONTEND_INSTANCE_ID }}" \
            --parameters 'commands=[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_NAME }}:frontend-latest",
              "docker stop hls-frontend || true",
              "docker rm hls-frontend || true",
              "docker run -d --name hls-frontend -p 80:3000 --restart always -e BACKEND_PRIVATE_URL=http://${{ secrets.BACKEND_PRIVATE_IP }}:8000 ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_NAME }}:frontend-latest"
            ]' \
            --comment "Deploy Frontend Container"
