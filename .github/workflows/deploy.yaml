name: Build and Deploy

on:
  push:
    branches:
      # - main
      - feat/infra
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 1. Build and Push Backend Image
      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG

      # 2. Build and Push Frontend Image
      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # 3. Deploy Backend to EC2 Private via SSM Run Command
      - name: Generate Backend SSM Parameters
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY_NAME: ${{ secrets.ECR_REPOSITORY_NAME }}
          SECRETS_MANAGER_NAME: ${{ secrets.SECRETS_MANAGER_NAME }}
        run: |
          envsubst < .github/scripts/ssm_backend.json > backend-params.json

      - name: Deploy Backend
        run: |
          aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "${{ secrets.BACKEND_INSTANCE_ID }}" \
            --parameters file://backend-params.json \
            --comment "Deploy Backend Container"

      # 4. Deploy Frontend to EC2 Public via SSM Run Command
      - name: Generate Frontend SSM Parameters
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY_NAME: ${{ secrets.ECR_REPOSITORY_NAME }}
          BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
        run: |
          envsubst < .github/scripts/ssm-frontend.json > frontend-params.json

      - name: Deploy Frontend
        run: |
          aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "${{ secrets.FRONTEND_INSTANCE_ID }}" \
            --parameters file://frontend-params.json \
            --comment "Deploy Frontend Container"
