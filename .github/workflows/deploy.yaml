name: Build and Deploy

on:
  push:
    branches:
      # - main
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 1. Build and Push Backend Image
      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG

      # 2. Build and Push Frontend Image
      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:frontend-$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # 3. Fetch SSH Private Key and query EC2 Public IPs
      - name: Prepare SSH Deployment Credentials
        run: |
          aws secretsmanager get-secret-value --secret-id "hire-train-AI-HLSTeam--ssh-key" --query SecretString --output text > private_key.pem
          chmod 600 private_key.pem
          
          FRONTEND_IP=$(aws ec2 describe-instances --instance-ids "${{ secrets.FRONTEND_INSTANCE_ID }}" --query "Reservations[0].Instances[0].PublicIpAddress" --output text)
          BACKEND_IP=$(aws ec2 describe-instances --instance-ids "${{ secrets.BACKEND_INSTANCE_ID }}" --query "Reservations[0].Instances[0].PublicIpAddress" --output text)
          
          echo "FRONTEND_IP=$FRONTEND_IP" >> $GITHUB_ENV
          echo "BACKEND_IP=$BACKEND_IP" >> $GITHUB_ENV

      # 4. Deploy Backend via SSH
      - name: Deploy Backend via SSH
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY_NAME: ${{ secrets.ECR_REPOSITORY_NAME }}
          SECRETS_MANAGER_NAME: ${{ secrets.SECRETS_MANAGER_NAME }}
        run: |
          cat << 'EOF' > backend-deploy.sh
          #!/bin/bash
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY_NAME:backend-latest
          aws secretsmanager get-secret-value --secret-id $SECRETS_MANAGER_NAME --query SecretString --output text > /home/ubuntu/backend_raw.json
          python3 -c "import json,sys; d=json.load(open('/home/ubuntu/backend_raw.json')); print(''.join(f'{k}={v}\n' for k,v in d.items()), end='')" > /home/ubuntu/backend.env
          docker stop hls-backend || true
          docker rm hls-backend || true
          docker run -d --name hls-backend -p 8000:8000 --restart always --env-file /home/ubuntu/backend.env $ECR_REGISTRY/$ECR_REPOSITORY_NAME:backend-latest
          rm -f /home/ubuntu/backend_raw.json /home/ubuntu/backend.env
          EOF
          chmod +x backend-deploy.sh
          
          scp -o StrictHostKeyChecking=no -i private_key.pem backend-deploy.sh ubuntu@${{ env.BACKEND_IP }}:/home/ubuntu/backend-deploy.sh
          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ env.BACKEND_IP }} "ECR_REGISTRY=$ECR_REGISTRY ECR_REPOSITORY_NAME=$ECR_REPOSITORY_NAME SECRETS_MANAGER_NAME=$SECRETS_MANAGER_NAME /home/ubuntu/backend-deploy.sh && rm -f /home/ubuntu/backend-deploy.sh"

      # 5. Deploy Frontend via SSH
      - name: Deploy Frontend via SSH
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY_NAME: ${{ secrets.ECR_REPOSITORY_NAME }}
          BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
        run: |
          cat << 'EOF' > frontend-deploy.sh
          #!/bin/bash
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY_NAME:frontend-latest
          docker stop hls-frontend || true
          docker rm hls-frontend || true
          docker run -d --name hls-frontend -p 80:3000 --restart always -e BACKEND_PRIVATE_URL=http://$BACKEND_PRIVATE_IP:8000 $ECR_REGISTRY/$ECR_REPOSITORY_NAME:frontend-latest
          EOF
          chmod +x frontend-deploy.sh
          
          scp -o StrictHostKeyChecking=no -i private_key.pem frontend-deploy.sh ubuntu@${{ env.FRONTEND_IP }}:/home/ubuntu/frontend-deploy.sh
          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ env.FRONTEND_IP }} "ECR_REGISTRY=$ECR_REGISTRY ECR_REPOSITORY_NAME=$ECR_REPOSITORY_NAME BACKEND_PRIVATE_IP=$BACKEND_PRIVATE_IP /home/ubuntu/frontend-deploy.sh && rm -f /home/ubuntu/frontend-deploy.sh"
